[dev]
image=fedora:latest
additional_packages="tldr tmux git zoxide bat direnv npm python3 python3-pip go lldb ripgrep rustup gcc jq cmake make gcc gcc-c++ man neovim valgrind"
additional_packages="xcb-util-image-devel libxkbcommon-x11-devel libxkbcommon-devel xkbcomp-devel wayland-devel libX11-devel xorg-x11-server-devel openssl-devel"
additional_package="flatpak-builder fontconfig-devel perl-interpreter libxcb-devel mesa-libEGL-devel xcb-util xcb-util-devel xcb-util-keysyms-devel xcb-util-wm-devel rpm-build perl-FindBin perl-File-Compare"
additional_packages="@development-tools @development-libs"
replace=false
pull=true
root=false
init=false
start_now=true
exported_bins_path="~/.local/bin/"
