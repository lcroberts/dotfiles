[dev]
image=ghcr.io/ublue-os/fedora-toolbox
additional_packages="tldr tmux git zoxide bat direnv npm python3 python3-pip go lldb ripgrep rustup gcc jq cmake make gcc gcc-c++ man neovim valgrind php composer mysql vim fd-find opam erlang erlang-dialyzer erlang-edoc zig"
additional_packages="@development-tools @development-libs"
replace=false
pull=true
root=false
init=false
start_now=true
exported_bins_path="$HOME/.local/bin/"
exported_apps=""
exported_bins=""

[aur]
image=ghcr.io/ublue-os/arch-distrobox
additional_packages="git rustup vim bat sudo neovim base-devel direnv zoxide dart-sass"
pull=true
replace=false
root=false
init=false
exported_bins_path="$HOME/.local/bin/"
exported_apps=""
exported_bins="/usr/bin/sass /usr/bin/sassc"
