[dev]
image=fedora:latest
additional_packages="tldr tmux git zoxide bat direnv npm python3 go lldb ripgrep rustup gcc jq cmake make man neovim valgrind"
additional_packages="fontconfig-devel xcb-util-image-devel libxkbcommon-x11-devel libxkbcommon-devel xkbcomp-devel xcb-util  wayland-devel libX11-devel xorg-x11-server-devel openssl-devel"
additional_packages="@development-tools @development-libs"
replace=true
pull=true
root=false
init=false
start_now=true
exported_bins_path="~/.local/bin/"
exported_apps=""
exported_bins=""

[aur]
image=archlinux:latest
additional_packages="git rustup vim bat sudo neovim base-devel direnv zoxide"
pull=true
replace=false
root=false
init=false
exported_bins_path="~/.local/bin/"
exported_apps=""
exported_bins=""
